<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <style>
    .box { fill:#f6f8fb; stroke:#1f78b4; stroke-width:2px; rx:6; }
    .edge { fill:#fff4e6; stroke:#f39c12; stroke-width:2px; rx:6; }
    .db { fill:#e8f5e9; stroke:#2e7d32; stroke-width:2px; rx:6; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size:13px; fill:#111827 }
    .title { font-family: Arial, Helvetica, sans-serif; font-size:16px; font-weight:700; fill:#0f172a }
    .arrow { stroke:#333; stroke-width:2; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <text x="18" y="28" class="title">Entropy Prime — Architecture</text>

  <!-- User / Browser -->
  <rect x="20" y="60" width="160" height="60" class="box"/>
  <text x="100" y="95" text-anchor="middle" class="label">Browser</text>

  <!-- Edge / nginx -->
  <rect x="220" y="40" width="180" height="100" class="edge"/>
  <text x="310" y="75" text-anchor="middle" class="label">nginx (static + proxy)</text>

  <!-- Frontend -->
  <rect x="440" y="20" width="200" height="70" class="box"/>
  <text x="540" y="55" text-anchor="middle" class="label">Frontend (Vite SPA)</text>

  <!-- Backend -->
  <rect x="440" y="120" width="200" height="80" class="box"/>
  <text x="540" y="160" text-anchor="middle" class="label">Backend (FastAPI)</text>

  <!-- Data stores -->
  <rect x="680" y="40" width="180" height="60" class="db"/>
  <text x="770" y="70" text-anchor="middle" class="label">MongoDB</text>

  <rect x="680" y="120" width="180" height="60" class="db"/>
  <text x="770" y="150" text-anchor="middle" class="label">Redis</text>

  <rect x="680" y="200" width="180" height="60" class="db"/>
  <text x="770" y="230" text-anchor="middle" class="label">Checkpoints (models)</text>

  <!-- Arrows -->
  <line x1="180" y1="90" x2="220" y2="90" class="arrow" />
  <line x1="310" y1="120" x2="440" y2="120" class="arrow" />

  <line x1="360" y1="60" x2="440" y2="60" class="arrow" />
  <line x1="640" y1="55" x2="680" y2="55" class="arrow" />

  <line x1="540" y1="200" x2="680" y2="200" class="arrow" />
  <line x1="540" y1="140" x2="680" y2="140" class="arrow" />

  <!-- Labels on arrows -->
  <text x="200" y="76" class="label">HTTP(S)</text>
  <text x="360" y="48" class="label">serve static</text>
  <text x="560" y="90" class="label">proxy API</text>

</svg>
