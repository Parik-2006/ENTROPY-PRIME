<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .actor { font-family: Arial, Helvetica, sans-serif; font-size:13px; fill:#0f172a }
    .box { fill:#fff; stroke:#1f2937; stroke-width:1.5; rx:6 }
    .arrow { stroke:#374151; stroke-width:2; marker-end: url(#arrowhead); }
    .note { font-family: Arial, Helvetica, sans-serif; font-size:12px; fill:#111827 }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>

  <text x="18" y="26" class="actor" style="font-weight:700; font-size:16px">Login + Scoring Sequence</text>

  <!-- Actors -->
  <text x="40" y="70" class="actor">User/Browser</text>
  <text x="260" y="70" class="actor">Frontend (SPA)</text>
  <text x="480" y="70" class="actor">nginx</text>
  <text x="700" y="70" class="actor">Backend (FastAPI)</text>

  <!-- Lifelines -->
  <line x1="80" y1="80" x2="80" y2="340" stroke="#cbd5e1" stroke-dasharray="4 4"/>
  <line x1="300" y1="80" x2="300" y2="340" stroke="#cbd5e1" stroke-dasharray="4 4"/>
  <line x1="520" y1="80" x2="520" y2="340" stroke="#cbd5e1" stroke-dasharray="4 4"/>
  <line x1="740" y1="80" x2="740" y2="340" stroke="#cbd5e1" stroke-dasharray="4 4"/>

  <!-- Messages -->
  <line x1="95" y1="120" x2="285" y2="120" class="arrow" />
  <text x="190" y="110" class="note" text-anchor="middle">Open /login (index.html + JS)</text>

  <line x1="305" y1="160" x2="505" y2="160" class="arrow" />
  <text x="405" y="150" class="note" text-anchor="middle">POST /auth/login {email,password}</text>

  <line x1="535" y1="160" x2="725" y2="160" class="arrow" />
  <text x="630" y="150" class="note" text-anchor="middle">proxy -> /auth/login</text>

  <line x1="725" y1="200" x2="535" y2="200" class="arrow" />
  <text x="630" y="190" class="note" text-anchor="middle">200 or 401</text>

  <line x1="505" y1="240" x2="305" y2="240" class="arrow" />
  <text x="405" y="230" class="note" text-anchor="middle">Response -> Frontend</text>

  <line x1="305" y1="280" x2="505" y2="280" class="arrow" />
  <text x="405" y="270" class="note" text-anchor="middle">POST /score {biometrics,latent_vector}</text>

  <line x1="535" y1="280" x2="725" y2="280" class="arrow" />
  <text x="630" y="270" class="note" text-anchor="middle">proxy -> /score</text>

  <line x1="725" y1="320" x2="535" y2="320" class="arrow" />
  <text x="630" y="310" class="note" text-anchor="middle">PipelineOutput {session_token,scores,action}</text>

  <line x1="505" y1="320" x2="305" y2="320" class="arrow" />
  <text x="405" y="310" class="note" text-anchor="middle">Response -> Frontend (store token)</text>

</svg>
