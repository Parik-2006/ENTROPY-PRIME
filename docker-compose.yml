# =============================================================
#  docker-compose.prod.yml — Entropy Prime Production Stack
#
#  Services:
#    nginx     — TLS termination, static file serving, rate limiting
#    backend   — FastAPI + ML inference (4 workers)
#    mongodb   — Honeypot & session persistence
#    redis     — Rate-limit state + session cache
#
#  Usage:
#    EP_DOMAIN=auth.example.com \
#    EP_SESSION_SECRET=$(openssl rand -hex 64) \
#    docker-compose -f docker-compose.prod.yml up -d
# =============================================================

# ── Shared secrets & config ───────────────────────────────────
x-backend-env: &backend-env
  PYTHONPATH: /opt/backend-deps
  EP_ENV: production
  EP_SESSION_SECRET: ${EP_SESSION_SECRET:?Set EP_SESSION_SECRET env var}
  EP_RL_CHECKPOINT: /app/checkpoints/governor.pt
  EP_HONEYPOT_ENABLED: "true"
  EP_MONGO_URI: mongodb://mongodb:27017/entropy
  MONGODB_URL: "mongodb://mongo_user:${MONGO_PASSWORD}@mongodb:27017/entropy?authSource=admin"
  MONGODB_DB_NAME: entropy
  EP_REDIS_URL: redis://redis:6379/0
  EP_CORS_ORIGINS: "*"
  PYTHONUNBUFFERED: "1"

services:

  # ── Nginx reverse proxy / TLS ────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: /
    container_name: entropy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/index.html"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── FastAPI backend ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: entropy_backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ./checkpoints:/app/checkpoints:ro
    expose:
      - "8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/__pycache__

  # ── MongoDB ───────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: entropy_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: entropy
    volumes:
      - mongo_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    expose:
      - "27017"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: entropy_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    expose:
      - "6379"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

# ── Named volumes ─────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  frontend_dist:
    driver: local
  nginx_logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true   # MongoDB and Redis are not reachable from outside